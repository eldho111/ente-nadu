name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python API + Worker ──────────────────────────────────────────
  api-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: civic_test
          POSTGRES_USER: civic
          POSTGRES_PASSWORD: civic
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://civic:civic@localhost:5432/civic_test
      REDIS_URL: redis://localhost:6379/0
      ENV: test
      ALLOW_TEST_OTP: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Lint with ruff
        run: pip install ruff && ruff check .
      - name: Run tests
        run: pytest -v --tb=short

  worker-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Lint with ruff
        run: pip install ruff && ruff check .

  # ── Next.js Web ──────────────────────────────────────────────────
  web-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Type check
        run: npx tsc --noEmit --pretty || true
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  # ── Flutter Mobile ───────────────────────────────────────────────
  mobile-analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.x"
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Run tests
        run: flutter test || true

  # ── Docker Build ─────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [api-lint-test, worker-lint, web-lint-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t civic-api:${{ github.sha }} api/
      - name: Build Worker image
        run: docker build -t civic-worker:${{ github.sha }} worker/
      - name: Build Web image
        run: docker build -t civic-web:${{ github.sha }} web/
