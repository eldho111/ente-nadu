<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Ente Nadu">
  <!-- Minimalist wordmark: alarm dot + ENTE NADU + Malayalam subtitle -->
  <!-- Background is transparent — renders correctly on dark or light surfaces. -->

  <!-- Alarm dot (echoes map markers) -->
  <circle cx="22" cy="40" r="14" fill="#d15e6a" opacity="0.14"/>
  <circle cx="22" cy="40" r="9"  fill="#d15e6a" opacity="0.32"/>
  <circle cx="22" cy="40" r="6"  fill="#d15e6a"/>

  <!-- ENTE NADU wordmark -->
  <text x="46" y="38"
        fill="currentColor"
        font-family="Inter, system-ui, sans-serif"
        font-size="24"
        font-weight="800"
        letter-spacing="4">ENTE NADU</text>

  <!-- Malayalam subtitle -->
  <text x="46" y="58"
        fill="currentColor" opacity="0.55"
        font-family="Inter, system-ui, sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="0.5">എന്റെ നാട് · CIVIC OPS · KERALA</text>
</svg>
