<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Map — Kerala">
  <!-- Simplified Kerala state silhouette with a pin -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <!-- Kerala outline (stylized — long, narrow, bordered by Western Ghats east, sea west) -->
    <path d="M 11 3
             C 8 5, 7 9, 8 13
             C 9 17, 7 20, 8 23
             C 9 26, 11 28, 13 29
             C 15 29, 17 28, 18 26
             C 19 24, 20 22, 22 20
             C 24 18, 25 15, 24 12
             C 23 9, 22 7, 20 5
             C 18 3, 14 2, 11 3 Z"/>
    <!-- Western Ghats ridge line (east border suggestion) -->
    <path d="M 22 10 Q 24 14, 22 18" stroke-width="1.2" opacity="0.6"/>
    <!-- Backwater squiggle -->
    <path d="M 10 15 Q 14 16, 13 19 Q 12 22, 15 22" stroke-width="1.1" opacity="0.7"/>
  </g>
  <!-- Pin at the center -->
  <g>
    <circle cx="15" cy="16" r="3" fill="currentColor"/>
    <circle cx="15" cy="16" r="1.2" fill="#fffdf5"/>
  </g>
</svg>
