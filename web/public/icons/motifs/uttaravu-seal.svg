<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Official seal — ഉത്തരവ്">
  <!-- Double outer ring (official seal feel) -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#a8321e" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="51" fill="none" stroke="#a8321e" stroke-width="1"/>

  <!-- Tiny Panchavarna notches around the ring (8 points) -->
  <g fill="#a8321e">
    <circle cx="60" cy="4" r="1.6"/>
    <circle cx="60" cy="116" r="1.6"/>
    <circle cx="4" cy="60" r="1.6"/>
    <circle cx="116" cy="60" r="1.6"/>
    <circle cx="20" cy="20" r="1.2"/>
    <circle cx="100" cy="20" r="1.2"/>
    <circle cx="20" cy="100" r="1.2"/>
    <circle cx="100" cy="100" r="1.2"/>
  </g>

  <!-- Outer Malayalam ribbon text (curved) — ENTE NADU · OFFICIAL -->
  <defs>
    <path id="seal-top" d="M 14 60 A 46 46 0 0 1 106 60" />
    <path id="seal-bot" d="M 14 60 A 46 46 0 0 0 106 60" />
  </defs>
  <text fill="#a8321e" font-family="'Special Elite','Courier New',monospace" font-size="9" font-weight="700" letter-spacing="2">
    <textPath href="#seal-top" startOffset="50%" text-anchor="middle">ENTE NADU · OFFICIAL</textPath>
  </text>
  <text fill="#a8321e" font-family="'Special Elite','Courier New',monospace" font-size="9" font-weight="700" letter-spacing="2">
    <textPath href="#seal-bot" startOffset="50%" text-anchor="middle">· KERALA · ഉത്തരവ് ·</textPath>
  </text>

  <!-- Inner ring divider dots at 3 & 9 o'clock (on the ribbon line) -->
  <g fill="#a8321e">
    <circle cx="12" cy="60" r="1.5"/>
    <circle cx="108" cy="60" r="1.5"/>
  </g>

  <!-- Center seal disc -->
  <circle cx="60" cy="60" r="32" fill="none" stroke="#a8321e" stroke-width="1.5"/>

  <!-- Stylized nilavilakku (5-tier lamp) silhouette in center -->
  <g fill="#a8321e" stroke="#a8321e" stroke-linejoin="round">
    <!-- Flame -->
    <path d="M60 36 C 58 40, 58 44, 60 46 C 62 44, 62 40, 60 36 Z"/>
    <!-- Wick cup -->
    <rect x="57" y="46" width="6" height="2" rx="0.5"/>
    <!-- Top plate -->
    <path d="M 52 48 L 68 48 L 66 51 L 54 51 Z"/>
    <!-- Stem -->
    <rect x="58.5" y="51" width="3" height="4"/>
    <!-- Tier 1 -->
    <path d="M 54 55 L 66 55 L 64 58 L 56 58 Z"/>
    <rect x="59" y="58" width="2" height="3"/>
    <!-- Tier 2 -->
    <path d="M 52 61 L 68 61 L 65 65 L 55 65 Z"/>
    <rect x="58.5" y="65" width="3" height="3"/>
    <!-- Base -->
    <path d="M 48 68 L 72 68 L 68 74 L 52 74 Z"/>
    <ellipse cx="60" cy="76" rx="14" ry="3"/>
  </g>

  <!-- PARIHARICHU / RESOLVED tag below lamp -->
  <text x="60" y="88" text-anchor="middle" fill="#a8321e" font-family="'Special Elite','Courier New',monospace" font-size="7" font-weight="700" letter-spacing="1.5">
    പരിഹരിച്ചു
  </text>
</svg>
