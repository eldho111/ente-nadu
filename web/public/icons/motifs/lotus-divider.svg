<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Lotus divider">
  <!-- Outer petals (mural chayilyam red) -->
  <g fill="#a8321e" opacity="0.9">
    <path d="M32 6 C36 14, 36 22, 32 28 C28 22, 28 14, 32 6 Z"/>
    <path d="M58 32 C50 36, 42 36, 36 32 C42 28, 50 28, 58 32 Z"/>
    <path d="M32 58 C28 50, 28 42, 32 36 C36 42, 36 50, 32 58 Z"/>
    <path d="M6 32 C14 28, 22 28, 28 32 C22 36, 14 36, 6 32 Z"/>
  </g>
  <!-- Diagonal petals (manayola yellow) -->
  <g fill="#d4a017" opacity="0.85">
    <path d="M50 14 C48 22, 42 26, 36 26 C38 20, 44 16, 50 14 Z"/>
    <path d="M50 50 C44 48, 38 44, 36 38 C42 38, 48 42, 50 50 Z"/>
    <path d="M14 50 C16 42, 22 38, 28 38 C26 44, 20 48, 14 50 Z"/>
    <path d="M14 14 C22 16, 26 20, 28 26 C20 26, 16 22, 14 14 Z"/>
  </g>
  <!-- Inner ring (zari gold) -->
  <circle cx="32" cy="32" r="9" fill="none" stroke="#b8860b" stroke-width="1.3"/>
  <!-- Core disc (kasavu cream with mural green stamen) -->
  <circle cx="32" cy="32" r="6" fill="#fffdf5" stroke="#0e6b47" stroke-width="0.8"/>
  <circle cx="32" cy="32" r="2.2" fill="#0e6b47"/>
  <!-- Tiny pollen dots -->
  <g fill="#b8860b">
    <circle cx="32" cy="28" r="0.7"/>
    <circle cx="36" cy="32" r="0.7"/>
    <circle cx="32" cy="36" r="0.7"/>
    <circle cx="28" cy="32" r="0.7"/>
  </g>
</svg>
