<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" width="100" height="80" role="img" aria-label="Kathakali eye">
  <!-- Broad face base (manayola yellow with mural green nose shape) -->
  <defs>
    <linearGradient id="face-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8b820"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
  </defs>

  <!-- Upper face arc (forehead) -->
  <path d="M 10 44
           Q 10 14, 50 14
           Q 90 14, 90 44 Z"
        fill="url(#face-bg)" stroke="#a8321e" stroke-width="1.2"/>

  <!-- Red eyebrow band -->
  <path d="M 14 30 Q 50 22, 86 30" stroke="#a8321e" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Left eye (elongated Kathakali eye) -->
  <g>
    <!-- White almond -->
    <path d="M 22 40
             Q 32 32, 44 40
             Q 32 46, 22 40 Z"
          fill="#fffdf5" stroke="#1a1208" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Iris -->
    <circle cx="33" cy="40" r="4" fill="#1a1208"/>
    <!-- Red accent (Kathakali kanna) -->
    <path d="M 22 40 Q 24 38, 26 40" stroke="#a8321e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 42 40 Q 44 38, 46 40" stroke="#a8321e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Right eye -->
  <g>
    <path d="M 56 40
             Q 66 32, 78 40
             Q 66 46, 56 40 Z"
          fill="#fffdf5" stroke="#1a1208" stroke-width="1.2" stroke-linejoin="round"/>
    <circle cx="67" cy="40" r="4" fill="#1a1208"/>
    <path d="M 56 40 Q 58 38, 60 40" stroke="#a8321e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 76 40 Q 78 38, 80 40" stroke="#a8321e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Mural-green chutti (decorative ridge on the cheeks) -->
  <g fill="#fffdf5" stroke="#0e6b47" stroke-width="1.1" stroke-linejoin="round">
    <path d="M 10 46 Q 6 52, 10 60 L 24 54 Z"/>
    <path d="M 90 46 Q 94 52, 90 60 L 76 54 Z"/>
    <path d="M 42 50 Q 50 56, 58 50 L 58 64 Q 50 70, 42 64 Z"/>
  </g>

  <!-- Tilak dot between eyebrows -->
  <circle cx="50" cy="28" r="2" fill="#a8321e"/>
</svg>
