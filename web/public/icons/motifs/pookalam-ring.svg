<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Pookalam flower ring">
  <defs>
    <radialGradient id="pg-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffdf5"/>
      <stop offset="100%" stop-color="#fbf4e0"/>
    </radialGradient>
  </defs>

  <!-- Outer ring: 16 marigold-style petals (chayilyam red) -->
  <g fill="#a8321e" opacity="0.85">
    <g id="outer-petal">
      <ellipse cx="100" cy="18" rx="7" ry="14"/>
    </g>
    <use href="#outer-petal" transform="rotate(22.5 100 100)"/>
    <use href="#outer-petal" transform="rotate(45 100 100)"/>
    <use href="#outer-petal" transform="rotate(67.5 100 100)"/>
    <use href="#outer-petal" transform="rotate(90 100 100)"/>
    <use href="#outer-petal" transform="rotate(112.5 100 100)"/>
    <use href="#outer-petal" transform="rotate(135 100 100)"/>
    <use href="#outer-petal" transform="rotate(157.5 100 100)"/>
    <use href="#outer-petal" transform="rotate(180 100 100)"/>
    <use href="#outer-petal" transform="rotate(202.5 100 100)"/>
    <use href="#outer-petal" transform="rotate(225 100 100)"/>
    <use href="#outer-petal" transform="rotate(247.5 100 100)"/>
    <use href="#outer-petal" transform="rotate(270 100 100)"/>
    <use href="#outer-petal" transform="rotate(292.5 100 100)"/>
    <use href="#outer-petal" transform="rotate(315 100 100)"/>
    <use href="#outer-petal" transform="rotate(337.5 100 100)"/>
  </g>

  <!-- Gold zari ring -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#b8860b" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#d4a84a" stroke-width="0.8"/>

  <!-- Middle ring: 12 manayola yellow petals -->
  <g fill="#d4a017" opacity="0.9">
    <g id="mid-petal">
      <ellipse cx="100" cy="40" rx="6" ry="12"/>
    </g>
    <use href="#mid-petal" transform="rotate(30 100 100)"/>
    <use href="#mid-petal" transform="rotate(60 100 100)"/>
    <use href="#mid-petal" transform="rotate(90 100 100)"/>
    <use href="#mid-petal" transform="rotate(120 100 100)"/>
    <use href="#mid-petal" transform="rotate(150 100 100)"/>
    <use href="#mid-petal" transform="rotate(180 100 100)"/>
    <use href="#mid-petal" transform="rotate(210 100 100)"/>
    <use href="#mid-petal" transform="rotate(240 100 100)"/>
    <use href="#mid-petal" transform="rotate(270 100 100)"/>
    <use href="#mid-petal" transform="rotate(300 100 100)"/>
    <use href="#mid-petal" transform="rotate(330 100 100)"/>
  </g>

  <!-- Inner gold ring -->
  <circle cx="100" cy="100" r="52" fill="none" stroke="#b8860b" stroke-width="1.2"/>

  <!-- Inner ring: 8 mural-green pacha petals -->
  <g fill="#0e6b47" opacity="0.9">
    <g id="inner-petal">
      <ellipse cx="100" cy="62" rx="5" ry="10"/>
    </g>
    <use href="#inner-petal" transform="rotate(45 100 100)"/>
    <use href="#inner-petal" transform="rotate(90 100 100)"/>
    <use href="#inner-petal" transform="rotate(135 100 100)"/>
    <use href="#inner-petal" transform="rotate(180 100 100)"/>
    <use href="#inner-petal" transform="rotate(225 100 100)"/>
    <use href="#inner-petal" transform="rotate(270 100 100)"/>
    <use href="#inner-petal" transform="rotate(315 100 100)"/>
  </g>

  <!-- Core: cream lamp disc for the counter -->
  <circle cx="100" cy="100" r="38" fill="url(#pg-center)" stroke="#b8860b" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="34" fill="none" stroke="#d4a84a" stroke-width="0.6"/>

  <!-- Tiny pollen dots at 4 cardinal points of the core -->
  <g fill="#a8321e">
    <circle cx="100" cy="66" r="1.5"/>
    <circle cx="134" cy="100" r="1.5"/>
    <circle cx="100" cy="134" r="1.5"/>
    <circle cx="66" cy="100" r="1.5"/>
  </g>
</svg>
