<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Kasavu corner ornament">
  <!-- Designed to sit in the TOP-LEFT corner; rotate 90/180/270 for other corners -->
  <!-- Outer double gold rule -->
  <path d="M 2 46 L 2 6 Q 2 2, 6 2 L 46 2"
        fill="none" stroke="#b8860b" stroke-width="1.3"/>
  <path d="M 6 46 L 6 10 Q 6 6, 10 6 L 46 6"
        fill="none" stroke="#d4a84a" stroke-width="0.9"/>

  <!-- Temple triangle (kovil motif) at the corner -->
  <g fill="#b8860b">
    <path d="M 12 12 L 18 12 L 15 8 Z"/>
    <path d="M 20 12 L 26 12 L 23 8 Z"/>
    <path d="M 12 20 L 12 14 L 8 17 Z"/>
    <path d="M 12 28 L 12 22 L 8 25 Z"/>
  </g>

  <!-- Small lotus bud at the inner corner -->
  <g transform="translate(15, 15)">
    <path d="M 0 -4 C -3 -2, -3 2, 0 4 C 3 2, 3 -2, 0 -4 Z" fill="#a8321e" opacity="0.85"/>
    <path d="M 0 -3 C -2 -1, -2 1, 0 3 C 2 1, 2 -1, 0 -3 Z" fill="#d4a017"/>
    <circle cx="0" cy="0" r="1" fill="#0e6b47"/>
  </g>

  <!-- Zari thread extensions -->
  <g stroke="#d4a84a" stroke-width="0.6" fill="none" opacity="0.7">
    <path d="M 26 6 L 30 6"/>
    <path d="M 34 6 L 38 6"/>
    <path d="M 6 30 L 6 34"/>
    <path d="M 6 38 L 6 42"/>
  </g>
</svg>
