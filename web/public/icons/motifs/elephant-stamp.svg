<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Temple elephant seal">
  <!-- Outer seal ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#0e6b47" stroke-width="2"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="#0e6b47" stroke-width="0.8"/>

  <!-- Kerala temple elephant silhouette (Gajaraja) -->
  <g fill="#0e6b47" stroke="#063a28" stroke-width="0.6" stroke-linejoin="round">
    <!-- Head + body -->
    <path d="M 22 58
             C 22 50, 26 44, 32 42
             C 34 38, 38 36, 44 36
             C 52 36, 58 40, 60 44
             C 66 44, 72 48, 74 54
             C 76 58, 76 64, 74 68
             L 74 74
             L 68 74
             L 68 70
             L 42 70
             L 42 74
             L 36 74
             L 36 70
             C 28 68, 22 64, 22 58 Z"/>

    <!-- Trunk -->
    <path d="M 28 56
             C 24 58, 22 64, 24 68
             C 26 70, 30 70, 32 68
             C 32 64, 30 60, 30 58 Z"/>

    <!-- Tusks -->
    <path d="M 32 62 L 28 66 L 30 64 Z" fill="#fbf4e0"/>

    <!-- Eye (small dot) -->
    <circle cx="42" cy="48" r="1.2" fill="#fbf4e0"/>

    <!-- Ear -->
    <path d="M 54 42
             C 58 40, 62 42, 62 48
             C 62 52, 58 52, 54 50 Z"
          fill="#063a28"/>

    <!-- Tail -->
    <path d="M 74 60 Q 78 62, 76 66" stroke="#063a28" stroke-width="1" fill="none"/>
  </g>

  <!-- Ceremonial headdress (nettipattam) — 3 gold domes -->
  <g fill="#b8860b" stroke="#8b6508" stroke-width="0.5">
    <path d="M 36 36 Q 38 30, 40 36 Z"/>
    <path d="M 42 34 Q 44 28, 46 34 Z"/>
    <path d="M 48 34 Q 50 28, 52 34 Z"/>
    <path d="M 54 34 Q 56 28, 58 34 Z"/>
    <path d="M 60 36 Q 62 30, 64 36 Z"/>
  </g>

  <!-- Gold dots around inside ring -->
  <g fill="#b8860b">
    <circle cx="50" cy="10" r="1"/>
    <circle cx="90" cy="50" r="1"/>
    <circle cx="50" cy="90" r="1"/>
    <circle cx="10" cy="50" r="1"/>
  </g>
</svg>
