<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Ente Nadu">
  <defs>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#147d54"/>
      <stop offset="100%" stop-color="#063a28"/>
    </linearGradient>
    <linearGradient id="zg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c34a"/>
      <stop offset="100%" stop-color="#8b6508"/>
    </linearGradient>
  </defs>

  <!-- Ola palm-leaf scroll pin -->
  <path d="M 24 4
           C 15 4, 8 11, 8 20
           C 8 28, 15 34, 22 40
           Q 24 43, 26 40
           C 33 34, 40 28, 40 20
           C 40 11, 33 4, 24 4 Z"
        fill="url(#pg)"
        stroke="#063a28" stroke-width="0.8"/>

  <!-- Tie thread -->
  <g stroke="#b8860b" stroke-width="0.4" opacity="0.55" fill="none">
    <path d="M 12 17 Q 24 18.5, 36 17"/>
    <path d="M 12 25 Q 24 26.5, 36 25"/>
  </g>

  <!-- Kasavu paper disc -->
  <circle cx="24" cy="20" r="9" fill="#fffdf5" stroke="url(#zg)" stroke-width="0.8"/>

  <!-- Malayalam 'എ' monogram (simplified for 48×48) -->
  <g transform="translate(24, 20)" fill="none" stroke="#063a28"
     stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -4 -3 Q -4 -6, -0.5 -6 Q 3 -6, 3 -3 Q 3 -1, 0.5 -0.5"/>
    <path d="M -0.5 -2 L -0.5 4"/>
    <path d="M -4 4 Q -0.5 6, 3 4"/>
    <path d="M -3 0.5 L 1.5 0.5" stroke-width="1.2"/>
  </g>

  <!-- Chayilyam tilak -->
  <circle cx="24" cy="6" r="1.4" fill="#a8321e" stroke="#fffdf5" stroke-width="0.4"/>

  <!-- Stylus tip -->
  <path d="M 22 40.5 L 24 43.5 L 26 40.5 Z" fill="#063a28"/>
</svg>
